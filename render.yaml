services:
  - type: web
    name: afb-backend
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: afb-db
          property: connectionString

databases:
  - name: afb-db
    plan: free
